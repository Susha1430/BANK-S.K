<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.K Bank ATM Admin Panel</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      padding:20px;
      color:#fff;
    }

    .main-container{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .box{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);
      border-radius:22px;
      padding:26px;
      box-shadow:0 12px 35px rgba(0,0,0,0.35);
      animation:fadeInUp .8s ease;
    }

    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(25px);}
      to{opacity:1;transform:translateY(0);}
    }

    h1,h2,h3{
      text-align:center;
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      font-size:14px;
      color:#d8f3ff;
      margin-bottom:20px;
    }

    .admin-list{
      display:flex;
      flex-direction:column;
      gap:14px;
      max-height:600px;
      overflow:auto;
    }

    .admin-card{
      background:rgba(255,255,255,0.10);
      border-radius:16px;
      padding:16px;
      animation:fadeInUp .5s ease;
    }

    .admin-card p{
      margin:6px 0;
      font-size:14px;
      color:#eef7ff;
      word-break:break-word;
    }

    .status{
      display:inline-block;
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:bold;
      margin-top:6px;
    }

    .pending{ background:rgba(255,193,7,0.2); color:#ffe082; }
    .approved{ background:rgba(76,175,80,0.2); color:#b9ffd0; }
    .rejected{ background:rgba(244,67,54,0.2); color:#ffd1d1; }

    .admin-actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .approve-btn,.reject-btn,.btn{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      color:#fff;
    }

    .approve-btn{
      background:linear-gradient(90deg,#11998e,#38ef7d);
    }

    .reject-btn{
      background:linear-gradient(90deg,#cb2d3e,#ef473a);
    }

    .btn{
      width:100%;
      margin-top:8px;
      padding:14px;
      border-radius:12px;
      background:linear-gradient(90deg,#00c6ff,#0072ff);
      font-size:15px;
    }

    .form-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      font-weight:bold;
      color:#eefaff;
    }

    input{
      width:100%;
      padding:13px;
      border:none;
      outline:none;
      border-radius:12px;
      font-size:15px;
      background:rgba(255,255,255,0.95);
      color:#222;
      transition:.3s ease;
    }

    input:focus{
      transform:scale(1.01);
      box-shadow:0 0 0 3px rgba(0,198,255,0.25);
    }

    .message{
      margin-top:16px;
      padding:12px;
      border-radius:12px;
      text-align:center;
      display:none;
      font-size:14px;
      animation:popIn .4s ease;
    }

    @keyframes popIn{
      from{opacity:0;transform:scale(.92);}
      to{opacity:1;transform:scale(1);}
    }

    .success{
      display:block;
      background:rgba(0,200,83,0.18);
      color:#b9ffd0;
      border:1px solid rgba(0,200,83,0.35);
    }

    .error{
      display:block;
      background:rgba(255,82,82,0.16);
      color:#ffd1d1;
      border:1px solid rgba(255,82,82,0.35);
    }

    .empty{
      text-align:center;
      color:#d8f3ff;
      padding:20px 10px;
      font-size:15px;
    }

    .card-preview{
      margin-top:16px;
      padding:18px;
      border-radius:18px;
      background:linear-gradient(135deg,#1f3c88,#39a0ed);
      box-shadow:0 10px 25px rgba(0,0,0,0.30);
      display:none;
      animation:zoomIn .5s ease;
    }

    @keyframes zoomIn{
      from{opacity:0;transform:scale(.92);}
      to{opacity:1;transform:scale(1);}
    }

    .card-preview p{
      margin:8px 0;
    }

    .big-number{
      font-size:22px;
      letter-spacing:2px;
      font-weight:bold;
      margin:16px 0;
    }

    .small-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .otp-box{
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.10);
      text-align:center;
      color:#ffe082;
      font-weight:bold;
    }

    @media(max-width:950px){
      .main-container{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    <div class="box">
      <h1>ATM Card Admin Panel</h1>
      <p class="subtitle">Approve or Reject ATM Card Requests</p>

      <div id="adminMessage" class="message"></div>
      <div id="adminList" class="admin-list"></div>
    </div>

    <div class="box">
      <h2>ATM Home</h2>
      <p class="subtitle">Set PIN / Forget PIN</p>

      <div id="atmMessage" class="message"></div>

      <form id="pinSetForm">
        <h3>Set ATM PIN</h3>
        <div class="form-group">
          <label>ATM Last 6 Digit Code</label>
          <input type="text" id="last6Digit" maxlength="6" placeholder="Enter ATM last 6 digit" required>
        </div>

        <div class="form-group">
          <label>Validity (MM/YY)</label>
          <input type="text" id="validity" placeholder="Enter validity ex. 01/31" required>
        </div>

        <div class="form-group">
          <label>Master Card</label>
          <input type="text" id="cardType" value="Master Card" readonly>
        </div>

        <div class="form-group">
          <label>Set 4 Digit PIN</label>
          <input type="password" id="pin1" maxlength="4" placeholder="Enter 4 digit PIN" required>
        </div>

        <div class="form-group">
          <label>Re-Enter 4 Digit PIN</label>
          <input type="password" id="pin2" maxlength="4" placeholder="Re-enter 4 digit PIN" required>
        </div>

        <button type="submit" class="btn">Set PIN</button>
      </form>

      <hr style="margin:22px 0;border-color:rgba(255,255,255,0.15);">

      <form id="forgotForm">
        <h3>Forget PIN Code</h3>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" id="forgotMobile" placeholder="Enter mobile number" required>
        </div>

        <div class="form-group">
          <label>ATM Card Number</label>
          <input type="text" id="forgotCardNumber" placeholder="Auto detect ATM card number" readonly>
        </div>

        <button type="button" id="sendOtpBtn" class="btn">Generate OTP</button>

        <div id="otpScreen" class="otp-box" style="display:none;"></div>

        <div class="form-group" style="margin-top:15px;">
          <label>Enter OTP Number</label>
          <input type="text" id="enteredOtp" placeholder="Enter OTP" />
        </div>

        <div class="form-group">
          <label>New 4 Digit PIN</label>
          <input type="password" id="newPin1" maxlength="4" placeholder="Enter new 4 digit PIN" />
        </div>

        <div class="form-group">
          <label>Re-Enter New 4 Digit PIN</label>
          <input type="password" id="newPin2" maxlength="4" placeholder="Re-enter new 4 digit PIN" />
        </div>

        <button type="button" id="resetPinBtn" class="btn">Change PIN Code</button>
      </form>

      <div id="cardPreview" class="card-preview">
        <h3>S.K Bank ATM Card</h3>
        <p><strong>Holder Name:</strong> <span id="previewName"></span></p>
        <p class="big-number" id="previewCardNumber"></p>
        <div class="small-row">
          <div><strong>Validity:</strong> <span id="previewValidity"></span></div>
          <div><strong>Type:</strong> Master Card</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const adminList = document.getElementById("adminList");
    const adminMessage = document.getElementById("adminMessage");
    const atmMessage = document.getElementById("atmMessage");

    const pinSetForm = document.getElementById("pinSetForm");
    const forgotForm = document.getElementById("forgotForm");

    const forgotMobile = document.getElementById("forgotMobile");
    const forgotCardNumber = document.getElementById("forgotCardNumber");
    const otpScreen = document.getElementById("otpScreen");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const resetPinBtn = document.getElementById("resetPinBtn");

    const cardPreview = document.getElementById("cardPreview");
    let generatedOtp = "";
    let forgotCardIndex = -1;

    function getCards() {
      return JSON.parse(localStorage.getItem("sk_bank_atm_cards")) || [];
    }

    function saveCards(cards) {
      localStorage.setItem("sk_bank_atm_cards", JSON.stringify(cards));
    }

    function showAdminMessage(text, type) {
      adminMessage.style.display = "block";
      adminMessage.className = "message " + type;
      adminMessage.textContent = text;
    }

    function showAtmMessage(text, type) {
      atmMessage.style.display = "block";
      atmMessage.className = "message " + type;
      atmMessage.textContent = text;
    }

    function formatCardNumber(cardNumber) {
      return cardNumber ? cardNumber.replace(/(.{4})/g, "$1 ").trim() : "Not Generated";
    }

    function generateNumber(length) {
      let result = "";
      for(let i=0;i<length;i++){
        result += Math.floor(Math.random()*10);
      }
      return result;
    }

    function generateUniqueCardNumber(cards) {
      let cardNumber;
      do{
        cardNumber = generateNumber(16);
      }while(cards.some(card => card.cardNumber === cardNumber));
      return cardNumber;
    }

    function generateValidity() {
      const today = new Date();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const year = String(today.getFullYear() + 5).slice(-2);
      return month + "/" + year;
    }

    function renderAdminPanel() {
      const cards = getCards();

      if(cards.length === 0){
        adminList.innerHTML = '<div class="empty">No ATM card requests found.</div>';
        return;
      }

      adminList.innerHTML = "";

      cards.forEach((card, index) => {
        let statusClass = "pending";
        if(card.status === "APPROVED") statusClass = "approved";
        if(card.status === "REJECTED") statusClass = "rejected";

        const div = document.createElement("div");
        div.className = "admin-card";
        div.innerHTML = `
          <p><strong>Holder Name:</strong> ${card.holderName}</p>
          <p><strong>Account Number:</strong> ${card.accountNumber}</p>
          <p><strong>Customer Number:</strong> ${card.customerNumber}</p>
          <p><strong>Card Number:</strong> ${card.cardNumber ? formatCardNumber(card.cardNumber) : "Not Generated"}</p>
          <p><strong>Validity:</strong> ${card.validity || "--/--"}</p>
          <p><strong>PIN Status:</strong> ${card.pin ? "PIN Set" : "PIN Not Set"}</p>
          <span class="status ${statusClass}">${card.status}</span>
          <div class="admin-actions">
            ${card.status === "PENDING" ? `<button class="approve-btn" onclick="approveCard(${index})">Approve</button>` : ""}
            ${card.status === "PENDING" ? `<button class="reject-btn" onclick="rejectCard(${index})">Reject</button>` : ""}
          </div>
        `;
        adminList.appendChild(div);
      });
    }

    function approveCard(index) {
      let cards = getCards();

      if(!cards[index] || cards[index].status !== "PENDING") return;

      cards[index].status = "APPROVED";
      cards[index].cardNumber = generateUniqueCardNumber(cards);
      cards[index].validity = generateValidity();
      cards[index].cardType = "Master Card";
      cards[index].pin = cards[index].pin || "";

      saveCards(cards);
      renderAdminPanel();
      showAdminMessage("ATM card approved successfully. Card number started.", "success");
    }

    function rejectCard(index) {
      let cards = getCards();

      if(!cards[index] || cards[index].status !== "PENDING") return;

      cards[index].status = "REJECTED";
      cards[index].cardNumber = "";
      cards[index].validity = "";
      cards[index].pin = "";

      saveCards(cards);
      renderAdminPanel();
      showAdminMessage("ATM card request rejected.", "error");
    }

    function showPreview(card) {
      document.getElementById("previewName").textContent = card.holderName || "";
      document.getElementById("previewCardNumber").textContent = formatCardNumber(card.cardNumber || "");
      document.getElementById("previewValidity").textContent = card.validity || "";
      cardPreview.style.display = "block";
    }

    pinSetForm.addEventListener("submit", function(e){
      e.preventDefault();

      const last6Digit = document.getElementById("last6Digit").value.trim();
      const validity = document.getElementById("validity").value.trim();
      const pin1 = document.getElementById("pin1").value.trim();
      const pin2 = document.getElementById("pin2").value.trim();

      let cards = getCards();

      const cardIndex = cards.findIndex(card =>
        card.status === "APPROVED" &&
        card.cardNumber &&
        card.cardNumber.slice(-6) === last6Digit &&
        card.validity === validity
      );

      if(cardIndex === -1){
        showAtmMessage("Approved ATM card not found. Check last 6 digit and validity.", "error");
        return;
      }

      if(!/^\d{4}$/.test(pin1) || !/^\d{4}$/.test(pin2)){
        showAtmMessage("PIN must be exactly 4 digits.", "error");
        return;
      }

      if(pin1 !== pin2){
        showAtmMessage("PIN and Re-entry PIN do not match.", "error");
        return;
      }

      cards[cardIndex].pin = pin1;
      saveCards(cards);
      showAtmMessage("ATM PIN set successfully.", "success");
      showPreview(cards[cardIndex]);
      pinSetForm.reset();
    });

    forgotMobile.addEventListener("input", function(){
      const mobile = forgotMobile.value.trim();
      const cards = getCards();

      const foundIndex = cards.findIndex(card =>
        card.mobileNumber === mobile &&
        card.status === "APPROVED" &&
        card.cardNumber
      );

      if(foundIndex !== -1){
        forgotCardIndex = foundIndex;
        forgotCardNumber.value = formatCardNumber(cards[foundIndex].cardNumber);
        showPreview(cards[foundIndex]);
      }else{
        forgotCardIndex = -1;
        forgotCardNumber.value = "";
      }
    });

    sendOtpBtn.addEventListener("click", function(){
      if(forgotCardIndex === -1){
        showAtmMessage("Mobile number not matched with approved ATM card.", "error");
        return;
      }

      generatedOtp = generateNumber(6);
      otpScreen.style.display = "block";
      otpScreen.textContent = "Generated OTP: " + generatedOtp;
      showAtmMessage("OTP generated successfully.", "success");
    });

    resetPinBtn.addEventListener("click", function(){
      if(forgotCardIndex === -1){
        showAtmMessage("No approved ATM card found for this mobile number.", "error");
        return;
      }

      const enteredOtp = document.getElementById("enteredOtp").value.trim();
      const newPin1 = document.getElementById("newPin1").value.trim();
      const newPin2 = document.getElementById("newPin2").value.trim();

      if(!generatedOtp){
        showAtmMessage("Please generate OTP first.", "error");
        return;
      }

      if(enteredOtp !== generatedOtp){
        showAtmMessage("Invalid OTP number.", "error");
        return;
      }

      if(!/^\d{4}$/.test(newPin1) || !/^\d{4}$/.test(newPin2)){
        showAtmMessage("New PIN must be exactly 4 digits.", "error");
        return;
      }

      if(newPin1 !== newPin2){
        showAtmMessage("New PIN and Re-entry PIN do not match.", "error");
        return;
      }

      let cards = getCards();
      cards[forgotCardIndex].pin = newPin1;
      saveCards(cards);

      showAtmMessage("ATM PIN changed successfully.", "success");
      showPreview(cards[forgotCardIndex]);

      generatedOtp = "";
      otpScreen.style.display = "none";
      otpScreen.textContent = "";
      forgotForm.reset();
      forgotCardNumber.value = "";
    });

    renderAdminPanel();
  </script>
</body>
</html>
