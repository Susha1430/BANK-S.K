<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.K Bank I.O App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

.container{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
margin-bottom:10px;
font-size:28px;
}

.subtitle{
margin-bottom:30px;
color:#ccefff;
}

.btn{
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
color:white;
}

.balance{
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

.addbank{
background:linear-gradient(90deg,#ff7e5f,#feb47b);
}

.logout{
background:linear-gradient(90deg,#ff416c,#ff4b2b);
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div class="container">

<h1>S.K Bank</h1>
<p class="subtitle">I.O App Home</p>

<button class="btn balance" onclick="balancePage()">
Balance Check
</button>

<button class="btn addbank" onclick="addBankPage()">
Add Bank Account
</button>

<button class="btn logout" onclick="logout()">
Logout
</button>

</div>

<script>

function balancePage(){
window.location.href="balance.html";
}

function addBankPage(){
window.location.href="add-bank.html";
}

function logout(){

localStorage.removeItem("io_login_mobile");

window.location.href="login.html";

}

</script>

</body>
</html>
