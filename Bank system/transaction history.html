<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.K Bank Transaction History</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px;
      color: #fff;
    }
    
    .container {
      width: 100%;
      max-width: 750px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      animation: fadeIn 0.8s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    .input-box {
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #0072ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
      transition: 0.3s;
    }
    
    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    
    .history {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .tx-card {
      background: rgba(255, 255, 255, 0.08);
      padding: 15px;
      border-radius: 12px;
      animation: slideIn 0.4s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .tx-type {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .deposit {
      color: #5dff9b;
    }
    
    .transfer {
      color: #ffd56b;
    }
    
    .atm {
      color: #ff8a8a;
    }
    
    .tx-amount {
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .tx-date {
      font-size: 13px;
      opacity: 0.8;
    }
    
    .empty {
      text-align: center;
      margin-top: 20px;
      opacity: 0.7;
      font-size: 15px;
    }
  </style>
</head>

<body>
  
  <div class="container">
    
    <h1>S.K Bank Transaction History</h1>
    
    <div class="input-box">
      <input type="text" id="accountNumber" placeholder="Enter Bank Account Number">
    </div>
    
    <button onclick="showHistory()">Show History</button>
    
    <div id="historyList" class="history"></div>
    
  </div>
  
  <script>
    /* GET TRANSACTIONS */
    
    function getTransactions() {
      return JSON.parse(localStorage.getItem("sk_bank_transactions")) || [];
    }
    
    /* SAVE TRANSACTION */
    
    function saveTransaction(accountNumber, type, amount) {
      
      let transactions = getTransactions();
      
      const now = new Date();
      
      const transaction = {
        accountNumber: accountNumber,
        type: type,
        amount: amount,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString()
      };
      
      transactions.push(transaction);
      
      localStorage.setItem("sk_bank_transactions", JSON.stringify(transactions));
      
    }
    
    /* SHOW HISTORY */
    
    function showHistory() {
      
      const acc = document.getElementById("accountNumber").value.trim();
      const historyBox = document.getElementById("historyList");
      
      historyBox.innerHTML = "";
      
      if (acc === "") {
        alert("Enter account number");
        return;
      }
      
      const transactions = getTransactions();
      
      const userTransactions = transactions.filter(tx => tx.accountNumber === acc);
      
      if (userTransactions.length === 0) {
        
        historyBox.innerHTML = "<div class='empty'>No Transaction History Found</div>";
        return;
        
      }
      
      userTransactions.reverse().forEach(tx => {
        
        let typeClass = "";
        
        if (tx.type === "DEPOSIT") typeClass = "deposit";
        if (tx.type === "TRANSFER") typeClass = "transfer";
        if (tx.type === "ATM") typeClass = "atm";
        
        const div = document.createElement("div");
        
        div.className = "tx-card";
        
        div.innerHTML = `

<div class="tx-type ${typeClass}">
${tx.type}
</div>

<div class="tx-amount">
Amount : ₹${tx.amount}
</div>

<div class="tx-date">
${tx.date} | ${tx.time}
</div>

`;
        
        historyBox.appendChild(div);
        
      });
      
    }
    
    /* DEMO DATA (optional) */
    
    if (!localStorage.getItem("sk_bank_transactions")) {
      
      let demo = [];
      
      demo.push({
        accountNumber: "1234567890",
        type: "DEPOSIT",
        amount: 500,
        date: "14/03/2026",
        time: "10:30 AM"
      });
      
      demo.push({
        accountNumber: "1234567890",
        type: "TRANSFER",
        amount: 200,
        date: "14/03/2026",
        time: "11:10 AM"
      });
      
      demo.push({
        accountNumber: "1234567890",
        type: "ATM",
        amount: 250,
        date: "14/03/2026",
        time: "12:00 PM"
      });
      
      localStorage.setItem("sk_bank_transactions", JSON.stringify(demo));
      
    }
  </script>
  
</body>

</html>
