<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.K Bank - Home</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
text-align:center;
animation:fadeIn .8s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:36px;
margin-bottom:40px;
animation:slideDown 1s ease;
}

@keyframes slideDown{
from{opacity:0; transform:translateY(-50px);}
to{opacity:1; transform:translateY(0);}
}

.button{
display:block;
width:200px;
padding:15px;
margin:15px auto;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
transition:all 0.3s ease;
background:linear-gradient(90deg,#00c6ff,#0072ff);
box-shadow:0 6px 15px rgba(0,114,255,0.35);
position:relative;
overflow:hidden;
}

.button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 25px rgba(0,114,255,0.45);
}

.button::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
transition:all 0.4s;
}

.button:hover::after{
left:0;
}

</style>
</head>
<body>

<div class="container">
<h1>S.K Bank</h1>

<button class="button" onclick="location.href='register.html'">Register</button>
<button class="button" onclick="location.href='login.html'">Login</button>

</div>

</body>
</html>
