<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.K Bank Intro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

.intro{
text-align:center;
animation:fadeIn 1.5s ease;
}

.title{
font-size:48px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 10px #ffd700,0 0 20px #ffae00,0 0 40px #ffae00;
animation:glow 1.5s infinite alternate;
}

.subtitle{
margin-top:15px;
font-size:20px;
color:#dbeafe;
animation:fadeUp 2s ease;
}

.loader{
width:250px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:20px;
margin:30px auto;
overflow:hidden;
}

.bar{
height:100%;
width:0;
background:linear-gradient(90deg,#ffd700,#00c6ff);
animation:load 3s linear forwards;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ffd700,0 0 20px #ffae00;}
to{ text-shadow:0 0 20px #fff176,0 0 40px #ff9800;}
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes load{
from{width:0;}
to{width:100%;}
}

</style>
</head>

<body>

<div class="intro">

<div class="title">Welcome to S.K Bank</div>

<div class="subtitle">Your Trust, Our Priority</div>

<div class="loader">
<div class="bar"></div>
</div>

<div>Opening Secure Banking System...</div>

</div>

<!-- Intro Sound -->
<audio autoplay>
  <source src="sk_bank_intro.mp3" type="audio/mpeg">
</audio>

// play sound
window.onload=function(){
document.getElementById("introSound").play();
}

// open homepage after 4 seconds
setTimeout(function(){
window.location.href="home.html";
},4000);

</script>

</body>
</html>
