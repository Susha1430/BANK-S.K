<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.K Bank Intro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.intro{
text-align:center;
}

.title{
font-size:48px;
color:#ffd700;
text-shadow:0 0 10px #ffd700,0 0 20px #ffae00;
margin-bottom:20px;
}

.subtitle{
font-size:18px;
margin-bottom:30px;
}

.btn{
padding:14px 28px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="intro">

<div class="title">S.K BANK</div>

<div class="subtitle">Your Trust, Our Priority</div>

<button class="btn" onclick="startBank()">Enter S.K Bank</button>

</div>

<audio id="introSound">
<source src="sk_bank_intro.mp3" type="audio/mpeg">
</audio>

<script>

function startBank(){

let sound=document.getElementById("introSound");

sound.play();

setTimeout(function(){
window.location.href="home.html";
},3000);

}

</script>

</body>
</html>
